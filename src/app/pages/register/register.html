<div class="auth-wrapper">
  <div class="auth-card">

    <h2>Welcome 👋</h2>
    <p class="sub-text">Create your Pixelroot account</p>

    <form #registerForm="ngForm" (ngSubmit)="register(registerForm)">

      <!-- Full Name -->
      <div class="form-group">
        <label>Full Name</label>
        <input 
          type="text" 
          name="fullName"
          ngModel
          required
          #fullName="ngModel"
          placeholder="Enter your full name">

        <small *ngIf="fullName.invalid && fullName.touched" style="color:red;">
          Full Name is required
        </small>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email"
          name="email"
          ngModel
          required
          email
          #email="ngModel"
          placeholder="Enter your email">

        <small *ngIf="email.errors?.['required'] && email.touched" style="color:red;">
          Email is required
        </small>

        <small *ngIf="email.errors?.['email'] && email.touched" style="color:red;">
          Enter valid email address
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input 
          type="password"
          name="password"
          ngModel
          required
          minlength="6"
          #password="ngModel"
          placeholder="Enter your password">

        <small *ngIf="password.errors?.['required'] && password.touched" style="color:red;">
          Password is required
        </small>

        <small *ngIf="password.errors?.['minlength'] && password.touched" style="color:red;">
          Password must be at least 6 characters
        </small>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label>Confirm Password</label>
        <input 
          type="password"
          name="confirmPassword"
          ngModel
          required
          #confirmPassword="ngModel"
          placeholder="Confirm your password">

        <small *ngIf="confirmPassword.touched && confirmPassword.value !== password.value" style="color:red;">
          Passwords do not match
        </small>
      </div>

      <button 
        type="submit"
        class="auth-btn"
        [disabled]="registerForm.invalid || confirmPassword.value !== password.value">
        Register
      </button>

      <div class="bottom-links">
        <a routerLink="/login">Already have an account?</a>
      </div>

    </form>

  </div>
</div>
